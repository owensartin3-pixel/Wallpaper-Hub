<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallpaper Hub 2.0</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
    }
    header {
        padding: 20px;
        text-align: center;
        background: #222;
        font-size: 2em;
        letter-spacing: 2px;
    }
    nav {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        background: #333;
    }
    nav button {
        background: #444;
        border: none;
        color: #fff;
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
        font-size: 1em;
        border-radius: 5px;
    }
    nav button:hover {
        background: #555;
    }
    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 10px;
        padding: 10px;
    }
    .gallery img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.2s;
    }
    .gallery img:hover {
        transform: scale(1.05);
    }
    #fullscreen {
        display: none;
        position: fixed;
        top:0; left:0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.95);
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }
    #fullscreen img {
        max-width: 90%;
        max-height: 90%;
        border-radius: 10px;
    }
    #fullscreen span {
        position: absolute;
        top: 20px;
        right: 40px;
        font-size: 2em;
        cursor: pointer;
        color: #fff;
    }
</style>
</head>
<body>

<header>Wallpaper Hub 2.0</header>
<nav>
    <button onclick="showCategory('all')">All</button>
    <button onclick="showCategory('gaming')">Gaming</button>
    <button onclick="showCategory('nature')">Nature</button>
    <button onclick="showCategory('abstract')">Abstract</button>
    <button onclick="showCategory('anime')">Anime</button>
</nav>

<div class="gallery" id="gallery"></div>

<div id="fullscreen" onclick="closeFullscreen()">
    <span>&times;</span>
    <img id="fullImage" src="">
</div>

<script>
const wallpapers = [
    { src: 'https://i.imgur.com/0.jpg', category: 'gaming' },
    { src: 'https://i.imgur.com/1.jpg', category: 'gaming' },
    { src: 'https://i.imgur.com/2.jpg', category: 'gaming' },
    { src: 'https://i.imgur.com/3.jpg', category: 'nature' },
    { src: 'https://i.imgur.com/4.jpg', category: 'nature' },
    { src: 'https://i.imgur.com/5.jpg', category: 'nature' },
    { src: 'https://i.imgur.com/6.jpg', category: 'abstract' },
    { src: 'https://i.imgur.com/7.jpg', category: 'abstract' },
    { src: 'https://i.imgur.com/8.jpg', category: 'abstract' },
    { src: 'https://i.imgur.com/9.jpg', category: 'anime' },
    { src: 'https://i.imgur.com/A.jpg', category: 'anime' },
    { src: 'https://i.imgur.com/B.jpg', category: 'anime' },
    { src: 'https://i.imgur.com/C.jpg', category: 'gaming' },
    { src: 'https://i.imgur.com/D.jpg', category: 'gaming' },
    { src: 'https://i.imgur.com/E.jpg', category: 'nature' },
    { src: 'https://i.imgur.com/F.jpg', category: 'abstract' },
    { src: 'https://i.imgur.com/G.jpg', category: 'anime' },
    // … Add more images up to 50+ if you want!
];

function showCategory(category) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    const filtered = category === 'all' ? wallpapers : wallpapers.filter(w => w.category === category);
    filtered.forEach(w => {
        const img = document.createElement('img');
        img.src = w.src;
        img.onclick = () => openFullscreen(w.src);
        gallery.appendChild(img);
    });
}

function openFullscreen(src) {
    document.getElementById('fullImage').src = src;
    document.getElementById('fullscreen').style.display = 'flex';
}
function closeFullscreen() {
    document.getElementById('fullscreen').style.display = 'none';
}

showCategory('all');
</script>

</body>
</html>
